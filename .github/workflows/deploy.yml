name: Deploy frontend-restorator to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: restaurant-frontend-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack (S3 + CloudFront)
        run: |
          aws cloudformation deploy \
            --stack-name "${{ env.STACK_NAME }}" \
            --template-file infra/cloudformation.yml \
            --no-fail-on-empty-changeset

      - name: Read stack outputs
        id: stack-outputs
        run: |
          bucket="$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue | [0]" \
            --output text)"
          distribution_id="$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue | [0]" \
            --output text)"
          distribution_domain="$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue | [0]" \
            --output text)"
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$distribution_domain" >> "$GITHUB_OUTPUT"

          echo "Site URL: https://$distribution_domain"
          echo "### Deployed site" >> "$GITHUB_STEP_SUMMARY"
          echo "https://$distribution_domain" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to S3
        env:
          BUCKET: ${{ steps.stack-outputs.outputs.bucket }}
        run: |
          aws s3 sync ./frontend/dist "s3://$BUCKET" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp ./frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ steps.stack-outputs.outputs.distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
